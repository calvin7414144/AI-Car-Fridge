{% load static simpletags i18n %}
{% get_current_language as LANGUAGE_CODE %}
<script type="text/javascript" src="{% static 'admin/simpleui-x/js/vue.min.js' %}?_={% get_version %}"></script>

<script type="text/javascript" src="{% static 'admin/simpleui-x/elementui/index.js' %}?_={% get_version %}"></script>
<script type="text/javascript" src="{% static 'admin/simpleui-x/elementui/umd/locale/en.js' %}?_={% get_version %}"></script>
<script type="text/javascript">
  let LANGUAGE_CODE = '{{ LANGUAGE_CODE }}';
  if (LANGUAGE_CODE.split('-')[0] !== 'zh') {
    ELEMENT.locale(ELEMENT.lang.en);
  }
</script>
